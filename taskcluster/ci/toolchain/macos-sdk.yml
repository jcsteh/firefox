---
job-defaults:
    attributes:
        local-toolchain: true
    worker-type: b-linux-gcp
    worker:
        max-run-time: 1800
        env:
            PATH: "/usr/local/bin:/bin:/sbin:/usr/bin:/usr/sbin"
    run:
        script: unpack-sdk.py
        resources:
            - python/mozbuild/mozpack/macpkg.py
            - taskcluster/scripts/misc/unpack-sdk.py
    # Expiry similar to that of fetches
    expires-after: 1000 years

macosx64-sdk-13.3:
    description: "MacOSX13.3 SDK"
    treeherder:
        symbol: TM(sdk13.3)
    run:
        arguments:
            - https://swcdn.apple.com/content/downloads/15/62/032-84673-A_7A1TG1RF8Z/xpc8q44ggn2pkn82iwr0fi1zeb9cxi8ath/CLTools_macOSNMOS_SDK.pkg
            - c33545d543a38911aee2a65d4bf7ff4932c12de1e6a042ae38e6415f65a10710
            - Library/Developer/CommandLineTools/SDKs/MacOSX13.3.sdk
        toolchain-artifact: project/gecko/mac-sdk/MacOSX13.3.sdk.tar.zst
        toolchain-alias:
            - MacOSX13.3.sdk

macosx64-sdk-14.0:
    description: "MacOSX14.0 SDK"
    treeherder:
        symbol: TM(sdk14.0)
    run:
        arguments:
            - https://swcdn.apple.com/content/downloads/48/60/042-46120-A_N66A5VQ6BX/qoleua6b09wgn0qyb8ci301cmwe3q0r8i6/CLTools_macOSNMOS_SDK.pkg
            - e2ebee6d2c9bc3beba96029cd52780447c4c25f7429a3c8cd8b49ccdace84f9d
            - Library/Developer/CommandLineTools/SDKs/MacOSX14.0.sdk
        toolchain-artifact: project/gecko/mac-sdk/MacOSX14.0.sdk.tar.zst
        toolchain-alias:
            - macosx64-sdk
            - macosx64-sdk-toolchain
            - MacOSX14.0.sdk

ios-sdk-16.4:
    description: "iPhoneOS16.4 SDK"
    treeherder:
        symbol: TM(ios16.4)
    # Because it's using an internal tooltool artifact, it can't be used as a local-toolchain for
    # bootstrap. But we still want to use the same script as local-toolchains.
    attributes:
        local-toolchain: false
    run:
        script: private_local_toolchain.sh
        arguments:
            - unpack-sdk.py
            - http://taskcluster/tooltool.mozilla-releng.net/sha512/a3b103d2226d867bd549932397d25a704ffe7d0d9cc99b364aba5952df96558ec50bee21b4c87687dc96e5e9f3fc00cfcf4b419af986aad3d630360a05e1d76f
            - 5871b0d773710f15b2f286b7df536a308cbf6335d16cc9b9cbd139a188587c7e
            - Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk
        toolchain-artifact: project/gecko/mac-sdk/iPhoneOS16.4.sdk.tar.zst
        toolchain-alias: ios-sdk
        tooltool-downloads: internal

ios-sim-sdk-16.4:
    description: "iPhoneSimulator16.4 SDK"
    treeherder:
        symbol: TM(ios-sim-16.4)
    # Because it's using an internal tooltool artifact, it can't be used as a local-toolchain for
    # bootstrap. But we still want to use the same script as local-toolchains.
    attributes:
        local-toolchain: false
    run:
        script: private_local_toolchain.sh
        arguments:
            - unpack-sdk.py
            - http://taskcluster/tooltool.mozilla-releng.net/sha512/a3b103d2226d867bd549932397d25a704ffe7d0d9cc99b364aba5952df96558ec50bee21b4c87687dc96e5e9f3fc00cfcf4b419af986aad3d630360a05e1d76f
            - 5871b0d773710f15b2f286b7df536a308cbf6335d16cc9b9cbd139a188587c7e
            - Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk
        toolchain-artifact: project/gecko/mac-sdk/iPhoneSimulator16.4.sdk.tar.zst
        toolchain-alias: ios-sim-sdk
        tooltool-downloads: internal
